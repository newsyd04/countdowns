name: countdowns
description: A premium countdown app with Apple-quality design and delightful interactions.
publish_to: 'none'
version: 1.4.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Persistence
  hive_ce: ^2.6.0
  hive_ce_flutter: ^2.1.0

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # UI & Animations
  flutter_animate: ^4.5.0
  vibration: ^2.0.0

  # Utilities
  uuid: ^4.4.2
  intl: ^0.20.2
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12
  hive_ce_generator: ^1.6.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  macos:
    generate: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#2C2C2E"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
